# In production, use External Secrets Operator to sync from AWS Secrets Manager.
# For a quick POC deploy, fill DATABASE_URL and apply manually (never commit the real values).
#
# aws secretsmanager create-secret --name wiki-rag/dev/db-url \
#   --secret-string "postgresql+asyncpg://wiki_rag:PASSWORD@RDS_ENDPOINT:5432/wiki_rag"
#
# kubectl create secret generic wiki-rag-secret \
#   --namespace wiki-rag \
#   --from-literal=DATABASE_URL="postgresql+asyncpg://..." \
#   --from-literal=DATABASE_URL_SYNC="postgresql://..."

apiVersion: v1
kind: Secret
metadata:
  name: wiki-rag-secret
  namespace: wiki-rag
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://wiki_rag:CHANGE_ME@RDS_ENDPOINT:5432/wiki_rag"
  DATABASE_URL_SYNC: "postgresql://wiki_rag:CHANGE_ME@RDS_ENDPOINT:5432/wiki_rag"
