# Requires AWS Load Balancer Controller installed on the cluster.
# Install via: https://kubernetes-sigs.github.io/aws-load-balancer-controller/
#
# kubectl apply -k "github.com/aws/eks-charts/stable/aws-load-balancer-controller/crds?ref=master"
# helm install aws-load-balancer-controller eks/aws-load-balancer-controller \
#   -n kube-system --set clusterName=<cluster-name>

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wiki-rag
  namespace: wiki-rag
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing   # use "internal" for VPN-only access
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Replace with your ACM certificate ARN
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/CERT_ID"
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  rules:
    - host: wiki-rag.CHANGE_ME.com   # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wiki-rag
                port:
                  number: 80
