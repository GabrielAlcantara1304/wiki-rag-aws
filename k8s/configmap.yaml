apiVersion: v1
kind: ConfigMap
metadata:
  name: wiki-rag-config
  namespace: wiki-rag
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  AWS_REGION: "us-east-1"
  OPENAI_EMBEDDING_MODEL: "text-embedding-3-small"
  OPENAI_EMBEDDING_DIMENSIONS: "1536"
  OPENAI_CHAT_MODEL: "gpt-4o"
  WIKI_CLONE_DIR: "/tmp/wiki_clones"
  RETRIEVAL_TOP_K: "10"
  RETRIEVAL_SIMILARITY_THRESHOLD: "0.5"
  CONTEXT_WINDOW_CHUNKS: "2"
  MAX_CHUNK_TOKENS: "800"
  CHUNK_OVERLAP_TOKENS: "100"
  GENERATION_TEMPERATURE: "0.1"
  CONVERSATION_HISTORY_TURNS: "3"
  GAP_SIMILARITY_THRESHOLD: "0.45"
  MAX_IMAGES_PER_RESPONSE: "3"
  # CORS_ORIGINS: '["https://wiki.example.com"]'   # uncomment and set your domain
  # GENERATION_CONTEXT: ""                          # optional domain context for the LLM
  # Terraform output secret_name goes here — app fetches DB credentials + OPENAI_API_KEY at startup
  AWS_SECRET_NAME: "wiki-rag-dev/app"
