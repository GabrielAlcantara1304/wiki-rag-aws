# wiki-rag CI/CD Pipeline
#
# Triggered on every push to main (or manually via workflow_dispatch).
# Uses GitHub Actions OIDC to assume an AWS IAM role — no long-lived credentials.
#
# Required GitHub repository secrets/variables:
#   Secrets:  AWS_ROLE_ARN (from terraform output github_actions_role_arn)
#   Variables: AWS_REGION, ECR_REPOSITORY, EKS_CLUSTER_NAME
#
# Set these after the first `terraform apply`:
#   gh secret set AWS_ROLE_ARN --body "$(terraform -chdir=terraform/environments/dev output -raw github_actions_role_arn)"
#   gh variable set AWS_REGION      --body "us-east-1"
#   gh variable set ECR_REPOSITORY  --body "$(terraform -chdir=terraform/environments/dev output -raw ecr_repository_url)"
#   gh variable set EKS_CLUSTER_NAME --body "$(terraform -chdir=terraform/environments/dev output -raw eks_cluster_name)"

name: Deploy to EKS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev]

permissions:
  id-token: write   # required for OIDC token
  contents: read

env:
  AWS_REGION:        ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY:    ${{ vars.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME:            ${{ vars.EKS_CLUSTER_NAME }}
  SQS_INGESTION_QUEUE_URL:     ${{ vars.SQS_INGESTION_QUEUE_URL }}
  S3_BUCKET:                   ${{ vars.S3_BUCKET }}
  LAMBDA_DOCX_EXTRACTOR_NAME:  ${{ vars.LAMBDA_DOCX_EXTRACTOR_NAME }}
  WIKI_RAG_ROLE_ARN:           ${{ vars.WIKI_RAG_ROLE_ARN }}

jobs:
  deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. AWS credentials via OIDC ──────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      # ── 3. Login to ECR ───────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build and push Docker image ───────────────────────────────────────
      - name: Build and push image
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE="${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${FULL_IMAGE}" .
          docker push "${FULL_IMAGE}"

          # Also tag as latest for convenience
          docker tag "${FULL_IMAGE}" "${ECR_REPOSITORY}:latest"
          docker push "${ECR_REPOSITORY}:latest"

          echo "image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

      # ── 5. Configure kubectl ──────────────────────────────────────────────────
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name   "${EKS_CLUSTER_NAME}"

      # ── 6. Apply base manifests (namespace, RBAC, config) ────────────────────
      - name: Apply base manifests
        run: |
          kubectl apply -f k8s/namespace.yaml

          kubectl apply -f k8s/serviceaccount.yaml

          # Inject Terraform outputs into the configmap before applying
          sed -i "s|REPLACE_WITH_TERRAFORM_OUTPUT|${SQS_INGESTION_QUEUE_URL}|" k8s/configmap.yaml
          sed -i "s|REPLACE_WITH_S3_BUCKET|${S3_BUCKET}|" k8s/configmap.yaml
          sed -i "s|REPLACE_WITH_LAMBDA_NAME|${LAMBDA_DOCX_EXTRACTOR_NAME}|" k8s/configmap.yaml
          kubectl apply -f k8s/configmap.yaml

          # Fetch DB URLs from Secrets Manager and create/update k8s Secret
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id wiki-rag-dev/app \
            --query SecretString \
            --output text)
          DB_URL=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['database_url'])")
          DB_URL_SYNC=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['database_url_sync'])")

          kubectl create secret generic wiki-rag-db-secret \
            --from-literal=DATABASE_URL="$DB_URL" \
            --from-literal=DATABASE_URL_SYNC="$DB_URL_SYNC" \
            --namespace wiki-rag \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── 7. Run database migrations ────────────────────────────────────────────
      - name: Run Alembic migrations
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE="${ECR_REPOSITORY}:${IMAGE_TAG}"

          # Inject the current image into the migration Job manifest
          sed "s|ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/wiki-rag-api:IMAGE_TAG|${FULL_IMAGE}|g" \
            k8s/job-migrate.yaml | kubectl apply -f -

          kubectl wait \
            --for=condition=complete \
            --timeout=120s \
            job/wiki-rag-migrate \
            -n wiki-rag

          kubectl delete job wiki-rag-migrate -n wiki-rag --ignore-not-found

      # ── 8. Apply deployments and services ────────────────────────────────────
      - name: Deploy new image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE="${ECR_REPOSITORY}:${IMAGE_TAG}"
          PLACEHOLDER="ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/wiki-rag-api:latest"

          # Apply deployment and worker with the correct image tag
          sed "s|${PLACEHOLDER}|${FULL_IMAGE}|g" k8s/deployment.yaml | kubectl apply -f -
          sed "s|${PLACEHOLDER}|${FULL_IMAGE}|g" k8s/worker-deployment.yaml | kubectl apply -f -

          kubectl apply -f k8s/service.yaml

          kubectl rollout status deployment/wiki-rag \
            -n wiki-rag \
            --timeout=300s

      # ── 9. Apply HPA ──────────────────────────────────────────────────────────
      - name: Apply HPA
        run: kubectl apply -f k8s/hpa.yaml

      # ── 10. Summary ───────────────────────────────────────────────────────────
      - name: Deployment summary
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "### Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${ECR_REPOSITORY}:${IMAGE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Cluster:** \`${EKS_CLUSTER_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pods:**" >> "$GITHUB_STEP_SUMMARY"
          kubectl get pods -n wiki-rag --no-headers | awk '{print "  - " $1 " " $3}' >> "$GITHUB_STEP_SUMMARY"
