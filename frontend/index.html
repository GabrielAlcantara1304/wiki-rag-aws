<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayesa - PaD</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0b18;
      --sidebar:   #0d0d20;
      --surface:   #13132a;
      --border:    #1e1e3a;
      --blue:      #3a3cf5;
      --pink:      #e8187a;
      --teal:      #00e5cc;
      --text:      #f0f0ff;
      --muted:     #6b6b8f;
      --font:      'Barlow', sans-serif;
      --display:   'Barlow Condensed', sans-serif;
      --sidebar-w: 240px;
    }

    html, body {
      height: 100%; overflow: hidden;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(58,60,245,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(58,60,245,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
      transition: opacity .8s ease;
    }
    body.no-grid::before { opacity: 0; }

    /* ─── app: dois painéis ─── */
    .app {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: 100vh;
      transition: grid-template-columns .3s cubic-bezier(.22,1,.36,1);
    }
    .app.sidebar-collapsed {
      grid-template-columns: 0px 1fr;
    }

    /* ══════════════════════════════
       SIDEBAR
    ══════════════════════════════ */
    .sidebar {
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      animation: slideInLeft .45s cubic-bezier(.22,1,.36,1) both;
      min-width: 0;
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .sidebar-inner {
      width: var(--sidebar-w);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 1rem .9rem .85rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex; align-items: center;
      margin-bottom: .85rem;
    }

    .logo img { height: 26px; width: auto; object-fit: contain; }

    .nav-link {
      display: flex; align-items: center; gap: .5rem;
      padding: .45em .75em; border-radius: 7px; font-size: .75rem;
      color: var(--muted); text-decoration: none;
      transition: background .15s, color .15s; margin-bottom: 2px;
    }
    .nav-link:hover { background: rgba(58,60,245,.08); color: var(--text); }
    .nav-link svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }

    .new-chat-btn {
      width: 100%;
      background: rgba(58,60,245,.1);
      border: 1px solid rgba(58,60,245,.25);
      color: var(--text);
      font-family: var(--font);
      font-size: .78rem;
      padding: .55em .9em;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; gap: .5rem;
      transition: background .15s, border-color .15s;
    }
    .new-chat-btn:hover { background: rgba(58,60,245,.18); border-color: var(--blue); }
    .new-chat-btn svg { width: 13px; height: 13px; fill: var(--blue); flex-shrink: 0; }

    /* history list */
    .sidebar-hist {
      flex: 1; overflow-y: auto;
      padding: .5rem .6rem;
    }

    .hist-group-label {
      font-size: .58rem; text-transform: uppercase; letter-spacing: .15em;
      color: var(--muted); padding: .75rem .4rem .3rem;
      font-weight: 600;
    }

    .hist-item {
      padding: .55rem .65rem;
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s;
      margin-bottom: 1px;
    }
    .hist-item:hover { background: rgba(58,60,245,.09); }
    .hist-item.active { background: rgba(58,60,245,.14); }

    .hist-item-q {
      font-size: .76rem; color: var(--text); line-height: 1.35;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hist-item-meta { font-size: .6rem; color: var(--muted); margin-top: .15rem; }

    .hist-empty {
      text-align: center; color: var(--muted); font-size: .75rem;
      padding: 2rem .75rem;
    }

    /* sidebar footer */
    .sidebar-footer {
      padding: .75rem .9rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }

    .status {
      display: flex; align-items: center; gap: .4rem;
      font-size: .63rem; color: var(--muted);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--teal); box-shadow: 0 0 6px var(--teal);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .hist-clear {
      background: none; border: none;
      color: var(--muted); font-family: var(--font);
      font-size: .62rem; cursor: pointer; padding: .2em .5em;
      border-radius: 4px; transition: color .15s;
    }
    .hist-clear:hover { color: var(--pink); }

    /* scrollbar sidebar */
    .sidebar-hist::-webkit-scrollbar { width: 3px; }
    .sidebar-hist::-webkit-scrollbar-track { background: transparent; }
    .sidebar-hist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ══════════════════════════════
       MAIN
    ══════════════════════════════ */
    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* header minimalista */
    header {
      padding: .7rem 1rem .7rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(11,11,24,.85);
      backdrop-filter: blur(16px);
      flex-shrink: 0;
      gap: .75rem;
      animation: slideDown .45s cubic-bezier(.22,1,.36,1) both;
    }

    .toggle-sidebar-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: .35rem;
      border-radius: 6px; display: flex; align-items: center;
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }
    .toggle-sidebar-btn:hover { color: var(--text); background: rgba(255,255,255,.06); }
    .toggle-sidebar-btn svg { width: 18px; height: 18px; fill: currentColor; display: block; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .elapsed { font-size: .65rem; color: var(--muted); }

    /* scroll area */
    .scroll-area {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; align-items: center;
    }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* empty state */
    .empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem; padding: 2rem 1rem 1rem;
      text-align: center; width: 100%; max-width: 680px;
      animation: heroReveal .6s .15s cubic-bezier(.22,1,.36,1) both;
    }
    .empty-state.hidden { display: none; }

    @keyframes heroReveal {
      from { opacity: 0; transform: scale(.97) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .hero-title {
      font-family: var(--display); font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 800; text-transform: uppercase; line-height: 1.05;
      user-select: none;
    }
    .hero-title span:not(.hero-cursor) { color: var(--pink); display: block; text-align: right; }
    .hero-cursor {
      color: var(--pink);
      animation: blink .7s step-end infinite;
      font-weight: 400;
    }

    .hero-sub { font-size: .8rem; color: var(--muted); line-height: 1.6; }
    .hero-sub em { color: var(--teal); font-style: normal; }

    .examples-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: .5rem; width: 100%;
    }

    .example-pill {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-family: var(--font); font-size: .75rem;
      padding: .7em 1em; cursor: pointer; border-radius: 10px;
      transition: color .15s, border-color .15s, background .15s;
      text-align: left; line-height: 1.4;
    }
    .example-pill:hover {
      color: var(--text); border-color: var(--blue);
      background: rgba(58,60,245,.07);
    }

    /* conversa */
    .conversation {
      width: 100%; max-width: 720px;
      padding: 1.5rem 1rem 0;
      display: flex; flex-direction: column; gap: 1.5rem;
    }

    /* loading */
    .loading {
      display: none; width: 100%; max-width: 720px;
      padding: 1rem; align-items: center; gap: .75rem;
      font-size: .78rem; color: var(--muted);
    }
    .loading.visible { display: flex; }

    .loading-bars { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
    .loading-bars span {
      display: block; width: 3px; background: var(--pink); border-radius: 1px;
      animation: bar 1.1s ease-in-out infinite;
    }
    .loading-bars span:nth-child(1){height:5px;  animation-delay:0s}
    .loading-bars span:nth-child(2){height:12px; animation-delay:.15s}
    .loading-bars span:nth-child(3){height:8px;  animation-delay:.3s}
    .loading-bars span:nth-child(4){height:16px; animation-delay:.45s}
    .loading-bars span:nth-child(5){height:7px;  animation-delay:.6s}
    @keyframes bar { 0%,100%{opacity:.3;transform:scaleY(.6)} 50%{opacity:1;transform:scaleY(1)} }

    /* resultado */
    .result {
      animation: fadeUp .3s ease forwards;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .answer-block {
      padding: .25rem 0 1rem;
    }
    .answer-text { font-size: 1.05rem; line-height: 1.9; color: var(--text); }
    .typing-cursor {
      color: var(--pink);
      animation: blink .7s step-end infinite;
      margin-left: 2px;
      display: inline;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* markdown */
    .answer-text h1, .answer-text h2 {
      font-family: var(--display); font-weight: 800;
      text-transform: uppercase; letter-spacing: .04em;
      color: var(--pink); margin: 1.2rem 0 .5rem; line-height: 1.15;
    }
    .answer-text h1 { font-size: 1.45rem; }
    .answer-text h2 { font-size: 1.2rem; }
    .answer-text h3 {
      font-family: var(--display); font-weight: 700; color: var(--teal);
      font-size: 1.05rem; text-transform: uppercase; letter-spacing: .06em;
      margin: 1rem 0 .4rem;
    }
    .answer-text h4 { font-weight: 600; color: var(--blue); font-size: 1rem; margin: .8rem 0 .3rem; }
    .answer-text p { margin: .5rem 0; }
    .answer-text strong { color: #fff; font-weight: 600; }
    .answer-text em { color: var(--teal); font-style: italic; }
    .answer-text ul, .answer-text ol {
      margin: .5rem 0 .5rem 1.4rem; display: flex; flex-direction: column; gap: .25rem;
    }
    .answer-text li { line-height: 1.65; }
    .answer-text ul li::marker { color: var(--pink); }
    .answer-text ol li::marker { color: var(--blue); font-weight: 600; }
    .answer-text code {
      background: rgba(58,60,245,.12); border: 1px solid rgba(58,60,245,.2);
      color: var(--teal); font-family: 'Courier New', monospace;
      font-size: .82em; padding: .15em .45em; border-radius: 4px;
    }
    .answer-text pre {
      background: #0a0a1a; border: 1px solid var(--border);
      border-left: 3px solid var(--blue); border-radius: 8px;
      padding: 1rem 1.25rem; overflow-x: auto; margin: .75rem 0;
    }
    .answer-text pre code {
      background: none; border: none; padding: 0;
      color: #c0c0e0; font-size: .83rem; line-height: 1.7;
    }
    .answer-text blockquote {
      border-left: 3px solid var(--blue); margin: .75rem 0;
      padding: .5rem 0 .5rem 1rem; color: var(--muted); font-style: italic;
      background: rgba(58,60,245,.04); border-radius: 0 6px 6px 0;
    }
    .answer-text table { width: 100%; border-collapse: collapse; margin: .75rem 0; font-size: .95rem; }
    .answer-text th {
      background: rgba(58,60,245,.15); color: var(--blue); font-weight: 600;
      text-align: left; padding: .6rem 1rem; border-bottom: 1px solid var(--border);
      font-family: var(--display); text-transform: uppercase; font-size: .82rem; letter-spacing: .06em;
    }
    .answer-text td { padding: .55rem 1rem; border-bottom: 1px solid rgba(30,30,58,.6); color: var(--text); }
    .answer-text tr:last-child td { border-bottom: none; }
    .answer-text tr:hover td { background: rgba(58,60,245,.04); }
    .answer-text hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    .answer-text a { color: var(--teal); text-decoration: underline; text-decoration-color: rgba(0,229,204,.3); }

    /* images block */
    .images-block {
      display: flex; flex-wrap: wrap; gap: .75rem;
      margin-top: 1rem;
    }
    .images-block img {
      max-width: 100%; max-height: 320px;
      border-radius: 8px; border: 1px solid var(--border);
      object-fit: contain; cursor: pointer;
      opacity: 0; animation: fadeUp .5s ease forwards;
    }
    .images-block img:nth-child(1) { animation-delay: 0s; }
    .images-block img:nth-child(2) { animation-delay: .15s; }
    .images-block img:nth-child(3) { animation-delay: .3s; }

    /* lightbox */
    .lightbox-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.88);
      align-items: center; justify-content: center;
      cursor: pointer;
    }
    .lightbox-overlay.active { display: flex; }
    .lightbox-overlay img {
      max-width: 92vw; max-height: 88vh;
      border-radius: 10px; border: 1px solid var(--border);
      object-fit: contain; pointer-events: none;
    }

    /* meta + fontes */
    .meta-row {
      padding: .75rem 0; background: transparent;
      display: flex; align-items: center; justify-content: space-between;
      font-size: .8rem; color: var(--muted); border-top: 1px solid var(--border);
    }
    .chunks { display: flex; align-items: center; gap: .4rem; }
    .chunks::before {
      content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--teal); box-shadow: 0 0 5px var(--teal);
    }
    .toggle-sources {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-family: var(--font); font-size: .78rem; padding: .35em 1em;
      cursor: pointer; border-radius: 6px; transition: color .15s, border-color .15s;
    }
    .toggle-sources:hover { color: var(--text); border-color: var(--pink); }

    .low-confidence-badge {
      display: inline-flex; align-items: center; gap: .35rem;
      font-size: .74rem; color: #f59e0b;
      background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.25);
      border-radius: 4px; padding: .25em .7em;
    }
    .low-confidence-badge svg { width: 11px; height: 11px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    .feedback-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-family: var(--font);
      font-size: .78rem; padding: .35em .85em; cursor: pointer;
      border-radius: 6px; display: inline-flex; align-items: center; gap: .3rem;
      transition: color .15s, border-color .15s;
    }
    .feedback-btn:hover { color: var(--pink); border-color: var(--pink); }
    .feedback-btn.sent { color: var(--pink); border-color: var(--pink); cursor: default; }
    .feedback-btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .sources-panel { display: none; flex-direction: column; background: var(--bg); }
    .sources-panel.open { display: flex; }
    .source-item {
      padding: .9rem 1.75rem; border-bottom: 1px solid var(--border);
      display: grid; grid-template-columns: 1fr auto;
      gap: .2rem 1rem; align-items: start; transition: background .15s;
    }
    .source-item:last-child { border-bottom: none; }
    .source-item:hover { background: rgba(58,60,245,.04); }
    .source-doc { font-size: .9rem; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .source-section { font-size: .8rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .source-snippet { font-size: .82rem; color: var(--muted); margin-top: .35rem; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; grid-column: 1/-1; }
    .sim-badge { font-size: .75rem; padding: .25em .6em; border-radius: 4px; background: rgba(58,60,245,.15); color: var(--blue); font-weight: 600; white-space: nowrap; }
    .sim-badge.high { background: rgba(232,24,122,.15); color: var(--pink); }
    .sim-badge.low  { background: rgba(107,107,143,.15); color: var(--muted); }

    .error-msg {
      display: none; padding: .9rem 1.25rem;
      border: 1px solid rgba(232,24,122,.3); background: rgba(232,24,122,.06);
      font-size: .8rem; color: var(--pink); border-radius: 12px;
      animation: fadeUp .25s ease forwards; width: 100%; max-width: 720px;
    }
    .error-msg.visible { display: block; }

    /* input */
    .input-area {
      width: 100%; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 1rem 1rem .75rem;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      animation: slideUp .5s .1s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .input-wrap { position: relative; width: 100%; max-width: 720px; }
    .search-box {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 1rem 3.5rem 1rem 1.25rem;
      font-family: var(--font); font-size: .92rem; color: var(--text);
      outline: none; resize: none; min-height: 56px; max-height: 180px;
      line-height: 1.55; transition: border-color .2s, box-shadow .2s; overflow-y: hidden;
    }
    .search-box::placeholder { color: var(--muted); }
    .search-box:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(58,60,245,.1), 0 0 24px rgba(58,60,245,.07);
    }
    .send-btn {
      position: absolute; right: .6rem; bottom: .6rem;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--pink); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s, box-shadow .15s; flex-shrink: 0;
    }
    .send-btn:hover { background: #ff2a90; box-shadow: 0 0 14px rgba(232,24,122,.4); }
    .send-btn:active { transform: scale(.95); }
    .send-btn:disabled { background: var(--muted); cursor: not-allowed; box-shadow: none; }
    .send-btn svg { width: 16px; height: 16px; fill: #fff; }
    .input-footer {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; max-width: 720px; margin-top: .4rem; padding: 0 .25rem;
    }
    .hint { font-size: .65rem; color: var(--muted); }
    kbd { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: .1em .4em; font-size: .62rem; }
  </style>
</head>
<body>
<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-top">
        <div class="logo">
          <img src="Ayesa.png" alt="Ayesa" />
        </div>
        <a href="/ui/ingest.html" class="nav-link" style="margin-bottom:.5rem">
        <svg viewBox="0 0 24 24"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
        Alimentar base
      </a>
      <button class="new-chat-btn" id="newChatBtn">
          <svg viewBox="0 0 24 24"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
          Nova conversa
        </button>
      </div>

      <div class="sidebar-hist" id="histList">
        <div class="hist-empty">Nenhuma pergunta ainda.</div>
      </div>

      <div class="sidebar-footer">
        <div class="status">
          <div class="status-dot"></div>
          online
        </div>
        <button class="hist-clear" id="histClear">Limpar</button>
      </div>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main">

    <header>
      <button class="toggle-sidebar-btn" id="toggleSidebar" title="Alternar barra lateral">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <span class="elapsed" id="elapsed"></span>
    </header>

    <div class="scroll-area" id="scrollArea">

      <div class="empty-state" id="emptyState">
        <div>
          <div class="hero-title" id="heroTitle"></div>
          <p class="hero-sub" style="margin-top:.6rem">
            <em id="statDocs">…</em> páginas · <em id="statChunks">…</em> chunks
          </p>
        </div>
        <div class="examples-grid">
          <button class="example-pill">O que é a ZOP?</button>
          <button class="example-pill">Como atualizo a ZOP?</button>
          <button class="example-pill">O que é a Landing Zone?</button>
          <button class="example-pill">Como criar uma plataforma EKS?</button>
          <button class="example-pill">Quais são as convenções de IaC?</button>
          <button class="example-pill">O que é o ZAIP?</button>
        </div>
      </div>

      <div class="conversation" id="conversation"></div>

      <div class="loading" id="loading">
        <div class="loading-bars">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <span id="loadingText">Buscando na documentação…</span>
      </div>

      <div class="error-msg" id="errorMsg"></div>

    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="question" class="search-box" placeholder="Pergunte sobre o ambiente…" rows="1"></textarea>
        <button class="send-btn" id="askBtn" title="Enviar">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="hint"><kbd>Enter</kbd> para enviar · <kbd>Shift+Enter</kbd> para quebrar linha</span>
        <span class="elapsed" id="elapsed2"></span>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<!-- Lightbox overlay -->
<div class="lightbox-overlay" id="lightboxOverlay">
  <img id="lightboxImg" src="" alt="" />
</div>

<script>
  // ── Constants ──────────────────────────────────────────────────────────────
  const API_BASE_URL                 = '';
  const HISTORY_STORAGE_KEY          = 'wiki_rag_history';
  const HISTORY_MAX_ITEMS            = 50;
  const LOW_CONFIDENCE_THRESHOLD     = 0.45;
  const LOADING_TEXT_INTERVAL_MS     = 1800;
  const TEXTAREA_MAX_HEIGHT_PX       = 180;
  const TYPEWRITER_CHAR_SPEED_MS     = 65;
  const TYPEWRITER_ANSWER_SPEED_MS   = 16;
  const TYPEWRITER_ERASE_SPEED_MS    = 38;
  const TYPEWRITER_PREP_SPEED_MS     = 80;
  const TYPEWRITER_PAUSE_MS          = 120;
  const TYPEWRITER_INITIAL_DELAY_MS  = 400;
  const SYNONYM_HOLD_DURATION_MS     = 3000;

  // ── DOM references ─────────────────────────────────────────────────────────
  const questionInput    = document.getElementById('question');
  const askButton        = document.getElementById('askBtn');
  const loadingIndicator = document.getElementById('loading');
  const loadingText      = document.getElementById('loadingText');
  const conversationEl   = document.getElementById('conversation');
  const emptyState       = document.getElementById('emptyState');
  const errorMessage     = document.getElementById('errorMsg');
  const elapsedEl        = document.getElementById('elapsed');
  const scrollArea       = document.getElementById('scrollArea');
  const newChatButton    = document.getElementById('newChatBtn');
  const historyList      = document.getElementById('histList');
  const historyClearBtn  = document.getElementById('histClear');
  const sidebarToggle    = document.getElementById('toggleSidebar');
  const appContainer     = document.querySelector('.app');


  // ── State ──────────────────────────────────────────────────────────────────
  let chatHistory    = [];
  let activeHistoryId = null;

  // ── Lightbox ───────────────────────────────────────────────────────────────
  const lightboxOverlay = document.getElementById('lightboxOverlay');
  const lightboxImage   = document.getElementById('lightboxImg');

  function openLightbox(imageUrl, altText) {
    lightboxImage.src = imageUrl;
    lightboxImage.alt = altText;
    lightboxOverlay.classList.add('active');
  }

  lightboxOverlay.addEventListener('click', () => {
    lightboxOverlay.classList.remove('active');
    lightboxImage.src = '';
  });

  sidebarToggle.addEventListener('click', () => appContainer.classList.toggle('sidebar-collapsed'));

  // ── Utilities ──────────────────────────────────────────────────────────────
  function escapeHtml(text) {
    return (text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function cleanText(text) {
    return (text || '').replace(/â€\x90/g, '→').replace(/[^\x00-\x7F\u00C0-\u024F\u2019\u2018\u201C\u201D→]/g, '');
  }

  function scrollToBottom() {
    setTimeout(() => scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' }), 50);
  }

  // ── History ────────────────────────────────────────────────────────────────
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_STORAGE_KEY) || '[]'); }
    catch { return []; }
  }

  function saveToHistory(question, answer, sources, totalChunks, images) {
    const history = loadHistory();
    history.unshift({ id: Date.now(), question, answer, sources, total_chunks: totalChunks, images, ts: new Date().toISOString() });
    if (history.length > HISTORY_MAX_ITEMS) history.length = HISTORY_MAX_ITEMS;
    localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(history));
  }

  function groupHistoryByDate(items) {
    const now    = new Date();
    const groups = {};
    const order  = ['Hoje', 'Ontem', 'Últimos 7 dias', 'Últimos 30 dias', 'Mais antigos'];

    items.forEach(item => {
      const daysDiff = Math.floor((now - new Date(item.ts)) / 86400000);
      const label    = daysDiff === 0 ? 'Hoje'
                     : daysDiff === 1 ? 'Ontem'
                     : daysDiff < 7  ? 'Últimos 7 dias'
                     : daysDiff < 30 ? 'Últimos 30 dias'
                     : 'Mais antigos';
      if (!groups[label]) groups[label] = [];
      groups[label].push(item);
    });

    return { groups, order };
  }

  function createHistoryItemElement(item) {
    const element  = document.createElement('div');
    element.className = 'hist-item' + (item.id === activeHistoryId ? ' active' : '');
    const timeLabel = new Date(item.ts).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    element.innerHTML = `
      <div class="hist-item-q">${escapeHtml(item.question)}</div>
      <div class="hist-item-meta">${timeLabel}</div>
    `;
    element.addEventListener('click', () => restoreHistoryItem(item));
    return element;
  }

  function renderHistoryPanel() {
    const history = loadHistory();
    historyList.innerHTML = '';

    if (!history.length) {
      historyList.innerHTML = '<div class="hist-empty">Nenhuma pergunta ainda.</div>';
      return;
    }

    const { groups, order } = groupHistoryByDate(history);
    order.forEach(label => {
      if (!groups[label]) return;
      const groupLabel = document.createElement('div');
      groupLabel.className = 'hist-group-label';
      groupLabel.textContent = label;
      historyList.appendChild(groupLabel);
      groups[label].forEach(item => historyList.appendChild(createHistoryItemElement(item)));
    });
  }

  function restoreHistoryItem(item) {
    activeHistoryId = item.id;
    chatHistory = [
      { role: 'user',      content: item.question },
      { role: 'assistant', content: item.answer   },
    ];
    conversationEl.innerHTML = '';
    emptyState.classList.add('hidden');
    document.body.classList.add('no-grid');
    renderHistoryPanel();
    conversationEl.appendChild(createQuestionBubble(item.question));
    renderResultInstant({ answer: item.answer, sources: item.sources, total_chunks_retrieved: item.total_chunks, images: item.images });
  }

  historyClearBtn.addEventListener('click', () => {
    localStorage.removeItem(HISTORY_STORAGE_KEY);
    activeHistoryId = null;
    renderHistoryPanel();
  });

  // ── Input ──────────────────────────────────────────────────────────────────
  questionInput.addEventListener('input', () => {
    questionInput.style.height = 'auto';
    questionInput.style.height = Math.min(questionInput.scrollHeight, TEXTAREA_MAX_HEIGHT_PX) + 'px';
  });

  questionInput.addEventListener('keydown', event => {
    if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); submitQuestion(); }
  });

  askButton.addEventListener('click', submitQuestion);

  document.querySelectorAll('.example-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      questionInput.value = pill.textContent;
      questionInput.dispatchEvent(new Event('input'));
      submitQuestion();
    });
  });

  // ── Ask flow ───────────────────────────────────────────────────────────────
  const loadingPhrases = ['Buscando na documentação…', 'Classificando resultados…', 'Gerando resposta…'];

  function createQuestionBubble(questionText) {
    const bubble = document.createElement('div');
    bubble.style.cssText = 'align-self:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 4px 14px;padding:.9rem 1.25rem;font-size:1rem;max-width:75%;line-height:1.6;animation:fadeUp .25s ease forwards';
    bubble.textContent = questionText;
    return bubble;
  }

  function setLoadingState(isLoading) {
    askButton.disabled = isLoading;
    loadingIndicator.classList.toggle('visible', isLoading);
    errorMessage.classList.remove('visible');
  }

  function startLoadingTextCycle() {
    let phraseIndex = 0;
    loadingText.textContent = loadingPhrases[0];
    return setInterval(() => {
      phraseIndex = (phraseIndex + 1) % loadingPhrases.length;
      loadingText.textContent = loadingPhrases[phraseIndex];
    }, LOADING_TEXT_INTERVAL_MS);
  }

  async function fetchAnswer(question) {
    const response = await fetch(`${API_BASE_URL}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, conversation_history: chatHistory }),
    });
    if (!response.ok) {
      const errorBody = await response.json().catch(() => ({ detail: response.statusText }));
      throw new Error(errorBody.detail || `HTTP ${response.status}`);
    }
    return response.json();
  }

  async function submitQuestion() {
    const question = questionInput.value.trim();
    if (!question) return;

    emptyState.classList.add('hidden');
    document.body.classList.add('no-grid');
    setLoadingState(true);
    elapsedEl.textContent = '';

    conversationEl.appendChild(createQuestionBubble(question));
    scrollToBottom();

    questionInput.value = '';
    questionInput.style.height = 'auto';

    const loadingTimer      = startLoadingTextCycle();
    const requestStartTime  = Date.now();

    try {
      const responseData    = await fetchAnswer(question);
      const elapsedSeconds  = ((Date.now() - requestStartTime) / 1000).toFixed(2);

      elapsedEl.textContent = `${elapsedSeconds}s`;
      document.getElementById('elapsed2').textContent = `${elapsedSeconds}s`;

      chatHistory.push({ role: 'user',      content: question             });
      chatHistory.push({ role: 'assistant', content: responseData.answer  });

      saveToHistory(question, responseData.answer, responseData.sources, responseData.total_chunks_retrieved, responseData.images);
      activeHistoryId = loadHistory()[0]?.id ?? null;
      renderHistoryPanel();
      renderResult(responseData);
    } catch (error) {
      errorMessage.textContent = `Erro: ${error.message}`;
      errorMessage.classList.add('visible');
    } finally {
      clearInterval(loadingTimer);
      setLoadingState(false);
      scrollToBottom();
    }
  }

  // ── Render result ──────────────────────────────────────────────────────────
  function buildImagesBlock(images) {
    if (!images || !images.length) return null;
    const block = document.createElement('div');
    block.className = 'images-block';
    images.forEach(image => {
      const imageEl  = document.createElement('img');
      imageEl.src    = image.url;
      imageEl.alt    = image.alt_text || '';
      imageEl.title  = image.alt_text || '';
      imageEl.addEventListener('click', () => openLightbox(image.url, image.alt_text || ''));
      block.appendChild(imageEl);
    });
    return block;
  }

  function buildSourcesPanel(sources) {
    const panel = document.createElement('div');
    panel.className = 'sources-panel';
    (sources || []).forEach(source => {
      const similarityPercent = (source.similarity * 100).toFixed(0);
      const badgeClass = source.similarity >= 0.6 ? 'high' : source.similarity < LOW_CONFIDENCE_THRESHOLD ? 'low' : '';
      const item = document.createElement('div');
      item.className = 'source-item';
      item.innerHTML = `
        <div>
          <div class="source-doc">${cleanText(source.document)}</div>
          <div class="source-section">${cleanText(source.section)}</div>
        </div>
        <span class="sim-badge ${badgeClass}">${similarityPercent}%</span>
        <div class="source-snippet">${escapeHtml(source.snippet)}</div>
      `;
      panel.appendChild(item);
    });
    return panel;
  }

  function buildMetaRow(responseData) {
    const totalChunks    = responseData.total_chunks_retrieved;
    const isLowConfidence = responseData.max_similarity != null && responseData.max_similarity < LOW_CONFIDENCE_THRESHOLD;
    const row = document.createElement('div');
    row.className = 'meta-row';
    row.innerHTML = `
      <span style="display:flex;align-items:center;gap:.6rem">
        <span class="chunks">${totalChunks} trecho${totalChunks !== 1 ? 's' : ''} recuperado${totalChunks !== 1 ? 's' : ''}</span>
        ${isLowConfidence ? `<span class="low-confidence-badge"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>baixa confiança</span>` : ''}
      </span>
      <span style="display:flex;align-items:center;gap:.5rem">
        <button class="feedback-btn" data-gap-id="${responseData.gap_id || ''}">
          <svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>
          Não ajudou
        </button>
        <button class="toggle-sources">Ver fontes</button>
      </span>
    `;
    return row;
  }

  function wireFeedbackButton(feedbackButton, responseData) {
    feedbackButton.addEventListener('click', async function () {
      if (this.classList.contains('sent')) return;
      const lastUserMessage = chatHistory.length >= 2 ? chatHistory[chatHistory.length - 2]?.content : '';
      try {
        await fetch(`${API_BASE_URL}/gaps/feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question:        lastUserMessage || 'desconhecida',
            answer_given:    (responseData.answer || '').slice(0, 500),
            max_similarity:  responseData.max_similarity ?? null,
          }),
        });
      } catch (_) {}
      this.classList.add('sent');
      this.innerHTML = `<svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg> Registrado`;
    });
  }

  function wireToggleSources(toggleButton, sourcesPanel) {
    let sourcesVisible = false;
    toggleButton.addEventListener('click', function () {
      sourcesVisible = !sourcesVisible;
      sourcesPanel.classList.toggle('open', sourcesVisible);
      this.textContent = sourcesVisible ? 'Ocultar fontes' : 'Ver fontes';
    });
  }

  function buildResultContainer(responseData) {
    const answerTextEl  = document.createElement('div');
    answerTextEl.className = 'answer-text';

    const answerBlock   = document.createElement('div');
    answerBlock.className = 'answer-block';
    answerBlock.appendChild(answerTextEl);

    const sourcesPanel  = buildSourcesPanel(responseData.sources);
    const metaRow       = buildMetaRow(responseData);

    wireFeedbackButton(metaRow.querySelector('.feedback-btn'), responseData);
    wireToggleSources(metaRow.querySelector('.toggle-sources'), sourcesPanel);

    const resultContainer = document.createElement('div');
    resultContainer.className = 'result';
    resultContainer.appendChild(answerBlock);
    resultContainer.appendChild(metaRow);
    resultContainer.appendChild(sourcesPanel);
    conversationEl.appendChild(resultContainer);

    return { answerTextEl, answerBlock };
  }

  function appendImages(answerBlock, images) {
    const imagesBlock = buildImagesBlock(images);
    if (!imagesBlock) return;
    answerBlock.appendChild(imagesBlock);
    scrollToBottom();
  }

  function renderResult(responseData) {
    const { answerTextEl, answerBlock } = buildResultContainer(responseData);
    scrollToBottom();
    typewriteText(answerTextEl, responseData.answer, () => appendImages(answerBlock, responseData.images));
  }

  function renderResultInstant(responseData) {
    const { answerTextEl, answerBlock } = buildResultContainer(responseData);
    answerTextEl.innerHTML = marked.parse(responseData.answer);
    appendImages(answerBlock, responseData.images);
    scrollToBottom();
  }

  // ── Typewriter ─────────────────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  function typewriteText(element, text, onComplete) {
    element.innerHTML = '';
    const words = text.split(' ');
    let wordIndex   = 0;
    let accumulated = '';

    const CURSOR_HTML = '<span class="typing-cursor">▋</span>';

    function renderWithCursor() {
      const parsed = marked.parse(accumulated);
      const lastClose = parsed.lastIndexOf('</');
      element.innerHTML = lastClose !== -1
        ? parsed.slice(0, lastClose) + CURSOR_HTML + parsed.slice(lastClose)
        : parsed + CURSOR_HTML;
    }

    function typeNextWord() {
      if (wordIndex >= words.length) {
        element.innerHTML = marked.parse(accumulated);
        if (onComplete) onComplete();
        return;
      }
      accumulated += (wordIndex === 0 ? '' : ' ') + words[wordIndex++];
      renderWithCursor();
      scrollToBottom();
      setTimeout(typeNextWord, TYPEWRITER_ANSWER_SPEED_MS);
    }

    typeNextWord();
  }

  // ── Hero typewriter ────────────────────────────────────────────────────────
  let currentHeroAnimationId = 0;

  const HERO_SYNONYMS = [
    { prep: 'à',  word: 'documentação.'         },
    { prep: 'à',  word: 'base de dados.'        },
    { prep: 'à',  word: 'wiki.'                 },
    { prep: 'à',  word: 'base de conhecimento.' },
    { prep: 'ao', word: 'repositório.'          },
    { prep: 'ao', word: 'manual técnico.'       },
  ];

  function runHeroTypewriter() {
    const animationId  = ++currentHeroAnimationId;
    const titleElement = document.getElementById('heroTitle');
    const firstLine    = 'Pergunte à';

    function isStale() { return animationId !== currentHeroAnimationId; }

    function setTitleWordFocus(prep, word) {
      titleElement.innerHTML = `Pergunte ${prep}<br/><span>${word}<span class="hero-cursor">▋</span></span>`;
    }

    function setTitlePrepFocus(prep, word) {
      titleElement.innerHTML = `Pergunte ${prep}<span class="hero-cursor">▋</span><br/><span>${word}</span>`;
    }

    function renderInitialFrame(charCount) {
      const fullText = firstLine + HERO_SYNONYMS[0].word;
      const line1 = fullText.slice(0, Math.min(charCount, firstLine.length));
      const line2 = charCount > firstLine.length ? fullText.slice(firstLine.length, charCount) : '';
      const cursor = '<span class="hero-cursor">▋</span>';
      return charCount > firstLine.length
        ? `${line1}<br/><span>${line2}${cursor}</span>`
        : `${line1}${cursor}`;
    }

    function typeInitialTitle() {
      const totalChars = (firstLine + HERO_SYNONYMS[0].word).length;
      let charCount = 0;

      function tick() {
        if (isStale()) return;
        titleElement.innerHTML = renderInitialFrame(charCount);
        if (charCount < totalChars) {
          charCount++;
          setTimeout(tick, TYPEWRITER_CHAR_SPEED_MS);
        } else {
          setTimeout(() => eraseWord(HERO_SYNONYMS[0].prep, HERO_SYNONYMS[0].word, 0), SYNONYM_HOLD_DURATION_MS);
        }
      }

      setTimeout(tick, TYPEWRITER_INITIAL_DELAY_MS);
    }

    function eraseWord(prep, word, synonymIndex) {
      if (isStale()) return;
      if (word.length === 0) {
        const nextIndex   = (synonymIndex + 1) % HERO_SYNONYMS.length;
        const nextSynonym = HERO_SYNONYMS[nextIndex];
        const prepChanged = nextSynonym.prep !== prep;
        const nextAction  = prepChanged
          ? () => erasePrep(prep, nextSynonym.prep, nextSynonym.word, nextIndex)
          : () => typeWord(prep, nextSynonym.word, nextIndex);
        setTimeout(nextAction, TYPEWRITER_PAUSE_MS);
        return;
      }
      setTitleWordFocus(prep, word.slice(0, -1));
      setTimeout(() => eraseWord(prep, word.slice(0, -1), synonymIndex), TYPEWRITER_ERASE_SPEED_MS);
    }

    function erasePrep(prep, nextPrep, nextWord, nextIndex) {
      if (isStale()) return;
      if (prep.length === 0) {
        setTimeout(() => typePrep('', nextPrep, nextWord, nextIndex), TYPEWRITER_PAUSE_MS);
        return;
      }
      setTitlePrepFocus(prep.slice(0, -1), '');
      setTimeout(() => erasePrep(prep.slice(0, -1), nextPrep, nextWord, nextIndex), TYPEWRITER_PREP_SPEED_MS);
    }

    function typePrep(typedPrep, targetPrep, nextWord, nextIndex) {
      if (isStale()) return;
      const current = targetPrep.slice(0, typedPrep.length + 1);
      setTitlePrepFocus(current, '');
      if (current.length < targetPrep.length) {
        setTimeout(() => typePrep(current, targetPrep, nextWord, nextIndex), TYPEWRITER_PREP_SPEED_MS);
      } else {
        setTimeout(() => typeWord(targetPrep, nextWord, nextIndex), TYPEWRITER_PAUSE_MS);
      }
    }

    function typeWord(prep, word, synonymIndex) {
      if (isStale()) return;
      let typed = '';
      function tick() {
        if (isStale()) return;
        typed = word.slice(0, typed.length + 1);
        setTitleWordFocus(prep, typed);
        if (typed.length < word.length) {
          setTimeout(tick, TYPEWRITER_CHAR_SPEED_MS);
        } else {
          setTimeout(() => eraseWord(prep, word, synonymIndex), SYNONYM_HOLD_DURATION_MS);
        }
      }
      tick();
    }

    typeInitialTitle();
  }

  // ── New chat ───────────────────────────────────────────────────────────────
  newChatButton.addEventListener('click', () => {
    chatHistory     = [];
    activeHistoryId = null;
    conversationEl.innerHTML = '';
    emptyState.classList.remove('hidden');
    document.body.classList.remove('no-grid');
    elapsedEl.textContent = '';
    document.getElementById('elapsed2').textContent = '';
    renderHistoryPanel();
    runHeroTypewriter();
    questionInput.focus();
  });

  // ── Stats ──────────────────────────────────────────────────────────────────
  (async function loadDocumentStats() {
    try {
      const response = await fetch(`${API_BASE_URL}/stats`);
      if (!response.ok) return;
      const { documents, chunks } = await response.json();
      document.getElementById('statDocs').textContent   = documents.toLocaleString('pt-BR');
      document.getElementById('statChunks').textContent = chunks.toLocaleString('pt-BR');
    } catch (_) {}
  })();

  // ── Init ───────────────────────────────────────────────────────────────────
  renderHistoryPanel();
  runHeroTypewriter();
</script>
</body>
</html>
